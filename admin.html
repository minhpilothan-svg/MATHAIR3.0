<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathAir - Bảng Điều Khiển Admin</title>
    
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/components.css">
    <link rel="stylesheet" href="CSS/admin.css">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="admin-page">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-crown"></i>
                    <span>MathAir Admin</span>
                </div>
                <button class="sidebar-toggle-mobile" id="sidebar-toggle-mobile" title="Đóng sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul class="sidebar-menu">
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link active" data-tab="dashboard">
                            <i class="fas fa-chart-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" data-tab="users">
                            <i class="fas fa-users"></i>
                            <span>Quản Lý Người Dùng</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" data-tab="roles">
                            <i class="fas fa-shield-alt"></i>
                            <span>Quản Lý Vai Trò</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" data-tab="analytics">
                            <i class="fas fa-chart-pie"></i>
                            <span>Thống Kê</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#" class="sidebar-link" data-tab="settings">
                            <i class="fas fa-cog"></i>
                            <span>Cài Đặt</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <img id="admin-avatar" src="" alt="Avatar" class="user-avatar">
                    <div class="user-details">
                        <p class="user-name" id="admin-name">Admin</p>
                        <p class="user-role" id="admin-role">Quản Trị Viên</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Header -->
            <header class="admin-header">
                <div class="admin-header-left">
                    <button class="hamburger-btn" id="hamburger-btn" title="Menu">
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                    </button>
                    <h1 id="page-title">Dashboard</h1>
                </div>

                <div class="admin-header-right">
                    <button class="header-btn" id="back-btn" title="Quay lại trang chính">
                        <i class="fas fa-home"></i>
                        <span>Về Trang Chủ</span>
                    </button>
                    <button class="header-btn" id="logout-admin-btn" title="Đăng xuất">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Đăng Xuất</span>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="admin-content" id="admin-content">
                <div class="loading">
                    <p>Đang tải...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Role Change Dialog -->
    <div id="role-dialog" class="role-dialog" style="display: none;">
        <div class="dialog-overlay"></div>
        <div class="dialog-box">
            <h3>Thay Đổi Vai Trò</h3>
            <div class="dialog-body">
                <p id="role-dialog-user-info"></p>
                <label>Chọn vai trò mới:</label>
                <select id="role-select">
                    <option value="user">Người Dùng</option>
                    <option value="reviewer">Người Chấm Chữa</option>
                    <option value="admin">Quản Trị Viên</option>
                </select>
            </div>
            <div class="dialog-actions">
                <button class="btn btn-secondary" onclick="AdminPageUI.closeRoleDialog()">Hủy</button>
                <button class="btn btn-primary" onclick="AdminPageUI.confirmChangeRole()">Xác Nhận</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="JS/firebase-config.js"></script>
    <script src="JS/role-management.js"></script>
    <script src="JS/admin.js"></script>
</body>
