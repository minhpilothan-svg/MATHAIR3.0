<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathAir - Học Toán Thông Minh</title>
    
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/components.css">
    <link rel="stylesheet" href="CSS/calculator.css">
    <link rel="stylesheet" href="CSS/contest.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.12.0/math.min.js"></script>
    
    <!-- Chart.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK from CDN (Compat version for global usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <header class="header" id="app-header">
    </header>

    <main class="main" id="main-content">
        <div class="loading">
            <p>Đang tải...</p>
        </div>
    </main>     

    <footer class="footer" id="app-footer">
        <p>&copy; 2026 MathAir. All rights reserved.</p>
    </footer>

    <!-- Settings Sidebar Overlay -->
    <div class="settings-overlay" id="settings-overlay" onclick="toggleSettingsSidebar()"></div>
    
    <!-- Settings Sidebar -->
    <aside class="settings-sidebar" id="settings-sidebar">
        <div class="settings-header">
            <h3>Cài Đặt</h3>
            <button class="settings-close" onclick="toggleSettingsSidebar()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="settings-body">
            <!-- Theme Setting -->
            <div class="settings-group">
                <label class="settings-label">
                    <i class="fas fa-moon"></i> Chế độ tối
                </label>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Language Setting -->
            <div class="settings-group">
                <label class="settings-label">
                    <i class="fas fa-globe"></i> Ngôn ngữ
                </label>
                <select id="language-select" class="settings-select">
                    <option value="vi">Tiếng Việt</option>
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                </select>
            </div>

            <!-- Notification Setting -->
            <div class="settings-group">
                <label class="settings-label">
                    <i class="fas fa-bell"></i> Thông báo
                </label>
                <label class="switch">
                    <input type="checkbox" id="notifications-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Sound Setting -->
            <div class="settings-group">
                <label class="settings-label">
                    <i class="fas fa-volume-up"></i> Âm thanh
                </label>
                <label class="switch">
                    <input type="checkbox" id="sound-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Text Size Setting -->
            <div class="settings-group">
                <label class="settings-label">
                    <i class="fas fa-text-height"></i> Kích thước chữ
                </label>
                <div class="text-size-controls">
                    <button class="text-size-btn" onclick="changeFontSize('decrease')" title="Giảm">−</button>
                    <span id="font-size-display">100%</span>
                    <button class="text-size-btn" onclick="changeFontSize('increase')" title="Tăng">+</button>
                </div>
            </div>

            <!-- Reset Setting -->
            <div class="settings-group">
                <button class="btn btn-secondary" onclick="resetSettings()">
                    <i class="fas fa-redo"></i> Đặt lại cài đặt
                </button>
            </div>
        </div>
    </aside>

    <div id="calculator-modal" class="calculator-modal" style="display: none;">
    </div>

    <!-- User Profile Modal -->
    <div id="user-profile-modal" class="modal" style="display: none;">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>Hồ Sơ Của Tôi</h3>
                <button class="modal-close" id="user-profile-modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="user-profile-body">
                <div class="profile-container">
                    <!-- User Info Section -->
                    <div class="profile-info">
                        <div class="profile-header">
                            <img id="my-profile-avatar" src="" alt="Avatar" class="profile-avatar">
                            <div class="profile-details">
                                <h4 id="my-profile-fullname"></h4>
                                <p id="my-profile-email"></p>
                                <p id="my-profile-school"></p>
                                <p id="my-profile-points" class="profile-points"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Charts Section -->
                    <div class="profile-charts">
                        <!-- Line Chart -->
                        <div class="chart-container">
                            <h5>Biểu Đồ Tiến Độ Học Tập</h5>
                            <canvas id="myProgressChart"></canvas>
                        </div>

                        <!-- Bar Chart -->
                        <div class="chart-container">
                            <h5>Biểu Đồ Điểm Số Theo Chương</h5>
                            <canvas id="myScoresChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="JS/firebase-config.js"></script>
    <script src="JS/role-management.js"></script>
    <script src="JS/auth.js"></script>
    <script src="JS/contests.js"></script>
    <script src="JS/contest-taking.js"></script>
    <script src="JS/calculator.js"></script>
    <script src="JS/quiz.js"></script>
    <script src="JS/app.js"></script>
    <script src="JS/router.js"></script>   
</body>
</html>
